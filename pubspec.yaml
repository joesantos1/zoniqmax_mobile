name: zoniqmax
description: ZonIQmax — jogo de domínio territorial por inteligência (app mobile).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  image_picker: ^1.2.2
  lucide_icons_flutter: ^3.1.14+2
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.2
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900

# Geração do ícone do app (dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#F2851B"
  adaptive_icon_foreground: assets/icon/icon_foreground.png
  remove_alpha_ios: true

# Geração do splash nativo (dart run flutter_native_splash:create)
flutter_native_splash:
  color: "#F2851B"
  image: assets/icon/splash_logo.png
  android_12:
    color: "#F2851B"
    image: assets/icon/splash_logo.png
